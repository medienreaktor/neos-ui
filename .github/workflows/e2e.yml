name: Build and Test E2E
on:
  workflow_dispatch:
  push:
    branches: [ main, '[0-9]+.[0-9]' ]
  pull_request:
    branches: [ main, '[0-9]+.[0-9]' ]

env:
  SAUCE_USERNAME: ${{secrets.SAUCE_USERNAME}}
  SAUCE_ACCESS_KEY: ${{secrets.SAUCE_ACCESS_KEY}}
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  server-build:
    env:
      FLOW_CONTEXT: Production
      FLOW_PATH_ROOT: ../neos-base-distribution

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.3'
            neos-version: '9.0'

    services:
      mariadb:
        # see https://mariadb.com/kb/en/mariadb-server-release-dates/
        # this should be a current release, e.g. the LTS version
        image: mariadb:10.6
        env:
          MYSQL_USER: neos
          MYSQL_PASSWORD: neos
          MYSQL_DATABASE: neos
          MYSQL_ROOT_PASSWORD: neos
        ports:
          - "3306:3306"
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, json, zlib, iconv, intl, pdo_sqlite, mysql

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        shell: bash

      - uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Prepare Neos distribution
        run: |
          cd "../neos-ui"
          # no "neos/neos-ui-compiled" because this job recompiles JS
          composer remove neos/neos-ui-compiled --no-update
          # install also export-ignore'd Test/ and packages/ directory
          rm .gitattributes

          git clone --depth 1 --branch ${{ matrix.neos-version }} https://github.com/neos/neos-development-distribution.git ${FLOW_PATH_ROOT}
          cd ${FLOW_PATH_ROOT}
          composer config --no-plugins allow-plugins.neos/composer-plugin true
          composer config repositories.package '{ "type": "path", "url": "../neos-ui", "options": { "symlink": false } }'
          composer require --no-update --no-interaction neos/neos-ui:@dev

      - name: Install npm dependencies
        run: |
          make install

      - name: Build for js for e2e
        run: |
          make build-e2e-testing

      - name: Install composer dependencies
        run: |
          cd ${FLOW_PATH_ROOT}
          composer install --no-interaction --no-progress --prefer-dist

      - name: Setup Flow
        run: |
          cd ${FLOW_PATH_ROOT}
          rm -f Configuration/Settings.yaml
          cat <<EOF >> Configuration/Settings.yaml
          Neos:
            Flow:
              persistence:
                backendOptions:
                  host: '127.0.0.1'
                  driver: pdo_mysql
                  user: 'neos'
                  password: 'neos'
                  dbname: 'neos'
          EOF
          ./flow doctrine:migrate
          ./flow user:create --username=admin --password=admin --first-name=Admin --last-name=Admington --roles=Administrator
          ./flow user:create --username=editor --password=editor --first-name=Editor --last-name=McEditworth --roles=Editor

      - name: Start flow server (in background)
        run: |
          echo 127.0.0.1 onedimension.localhost | sudo tee -a /etc/hosts
          echo 127.0.0.1 twodimensions.localhost | sudo tee -a /etc/hosts
          cat /etc/hosts
          cd ${FLOW_PATH_ROOT}
          ./flow server:run --port 8081 &
          sleep 1
          curl http://127.0.0.1:8081/neos/login
          curl http://onedimension.localhost:8081 --head
          curl http://twodimensions.localhost:8081 --head

      - name: Install sauce connect
        run: |
          curl -L -o sauce-connect.deb https://saucelabs.com/downloads/sauce-connect/5.1.3/sauce-connect_5.1.3.linux_amd64.deb
          sudo dpkg -i sauce-connect.deb

      - name: Run e2e tests
        run: |
          sc run --tunnel-name "circleci-tunnel" --region "us-west-1" --proxy-localhost allow
        # uses: saucelabs/saucectl-run-action@v4
        # env:
        #   SAUCE_PROXY_LOCALHOST: "allow"
        # with:
        #   working-directory: ${{ env.FLOW_PATH_ROOT }}/Packages/Application/Neos.Neos.Ui
        #   region: "us-west-1"
        #   tunnel-name: "circleci-tunnel"

      - name: Show testcafe output
        if: ${{ always() }}
        run: |
          cd ${FLOW_PATH_ROOT}
          for file in Data/Logs/saucelabs-artifacts/**/console.log; do
            echo $file
            cat $file
          done

      - name: Show Flow log on failure
        if: ${{ failure()  }}
        run: |
          cd ${FLOW_PATH_ROOT}
          cat Data/Logs/System_Testing.log
          for file in Data/Logs/Exceptions/*; do
            echo $file
            cat $file
          done
