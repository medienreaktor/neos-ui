
#
# CircleCI is disabled !!!
#
# Starting with Neos 9.0 we no longer use CircleCI. This file is to be eventually removed.
# But it needs to be kept to allow CircleCI to be active still for Neos 8.x (see error No configuration was found in your project.)
#
# Migrate fully to GitHub Actions and abandon CircleCI: https://github.com/neos/neos-ui/issues/4026
#

version: 2.1

general:
  branches:
    only:
      - 8.3
      - 8.4

jobs:
  noop:
    docker:
      - image: cimg/node:20.9-browsers
    steps:
      - run: node --version

workflows:
  version: 2
  noop-wf:
    jobs:
      - noop:
          filters:
            tags:
              only:
                - /never/
            branches:
              only:
                - /never/
